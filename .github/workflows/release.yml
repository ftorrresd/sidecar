name: Release

# Every push to main cuts a new patch release (vX.Y.(Z+1)), builds the binaries,
# and publishes a GitHub release with them attached. The tag is created by the
# release itself, so no commit is pushed back to the branch (no trigger loop).

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  version:
    name: Compute next version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: bump
        name: Bump patch version
        run: |
          set -euo pipefail
          latest=$(git tag -l 'v*.*.*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            # No tags yet: use the version declared in Cargo.toml as the first release.
            version=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          else
            version=$(echo "${latest#v}" | awk -F. '{ printf "%d.%d.%d", $1, $2, $3 + 1 }')
          fi
          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "tag=v$version" >>"$GITHUB_OUTPUT"
          echo "Next release: v$version (previous tag: ${latest:-none})"

  build:
    name: Build ${{ matrix.asset }}
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: sidecar-linux-x86_64.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Test dependency installation (install.sh)
        shell: bash
        env:
          SIDECAR_DEPS_ONLY: "1" # don't try to fetch a sidecar release
          SIDECAR_INSTALL_DEPS: "1" # non-interactive: answer "yes"
          SIDECAR_FORCE_DEPS: "1" # install even if the runner already has them
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          export SIDECAR_BIN_DIR="$RUNNER_TEMP/deps"
          sh scripts/install.sh
          for bin in delta bat rg fzf yazi; do
            "$SIDECAR_BIN_DIR/$bin" --version >/dev/null \
              || { echo "::error::dependency install failed for $bin"; exit 1; }
            echo "ok: $("$SIDECAR_BIN_DIR/$bin" --version | head -n1)"
          done

      - name: Package
        run: tar -czf "${{ matrix.asset }}" -C "target/${{ matrix.target }}/release" sidecar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    name: Publish release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download built binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ needs.version.outputs.tag }}"
          # `gh release create` creates the tag at this commit, so nothing is
          # pushed back to the branch.
          gh release create "$tag" dist/* \
            --target "$GITHUB_SHA" \
            --title "$tag" \
            --generate-notes
